<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Ikabay Sourcing</title>
  <script>
    // SPA fallback → HashRouter (#/route)
    var path = location.pathname;
    var base = path.match(/IKABAY/) ? '/IKABAY/' : '/';
    var rest = path.replace(base, '').replace(/^\/+/, '');
    if (rest && rest !== '') {
      location.replace(base + '#' + rest);
    } else {
      location.replace(base);
    }
  </script>
</head>
<body>
  <p>Redirection vers Ikabay Sourcing...</p>
</body>
</html>
