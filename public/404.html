<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Ikabay Sourcing</title>
  <script>
    // SPA redirect — compatible domaine racine (ikabay.store) et sous-chemin (/IKABAY/)
    var path = location.pathname;
    var base = path.match(/^(\/[^\/]+\/)/) ? RegExp.$1 : '/';
    var rest = path.replace(base, '');
    if (rest && rest !== '' && rest !== 'index.html') {
      location.replace(base + '?redirect=' + encodeURIComponent(rest + location.search + location.hash));
    } else {
      location.replace(base);
    }
  </script>
</head>
<body>
  <p>Redirection vers Ikabay Sourcing...</p>
</body>
</html>
